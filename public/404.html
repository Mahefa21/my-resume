<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>404 — Page introuvable · Charly RAOELIMAHEFA</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    :root {
      --bg: #f8fafc;
      --fg: #0f172a;
      --muted: #64748b;
      --accent: #38bdf8;
      --accent-2: #818cf8;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0f172a; --fg: #e2e8f0; --muted: #94a3b8; }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Poppins', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: grid;
      place-items: center;
      padding: 2rem;
      text-align: center;
    }
    .wrap { max-width: 560px; }
    .code {
      font-size: clamp(6rem, 18vw, 10rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.05em;
      margin-bottom: 0.6rem;
      animation: float 4s ease-in-out infinite;
    }
    h1 {
      font-size: clamp(1.4rem, 4vw, 1.9rem);
      margin: 0 0 0.6rem;
    }
    p {
      color: var(--muted);
      margin: 0 0 2rem;
      line-height: 1.55;
      font-size: 1rem;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.9rem 1.6rem;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(56, 189, 248, 0.3);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(56, 189, 248, 0.4);
    }
    .secondary {
      display: block;
      margin-top: 1rem;
      color: var(--muted);
      font-size: 0.85rem;
      text-decoration: none;
    }
    .secondary:hover { color: var(--accent); }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .code { animation: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code" aria-hidden="true">404</div>
    <h1 id="title">Page introuvable</h1>
    <p id="msg">Oups, cette page n'existe pas ou a été déplacée. Retournons à l'accueil ?</p>
    <a class="cta" href="/" id="cta">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      <span id="ctaLabel">Retour à l'accueil</span>
    </a>
    <a class="secondary" href="mailto:raoelimahefacharly@gmail.com">raoelimahefacharly@gmail.com</a>
  </div>
  <script>
    // Localize based on browser language (fallback FR)
    var lang = (navigator.language || 'fr').slice(0, 2);
    if (lang === 'en') {
      document.documentElement.lang = 'en';
      document.title = '404 — Page not found · Charly RAOELIMAHEFA';
      document.getElementById('title').textContent = 'Page not found';
      document.getElementById('msg').textContent = "Oops, this page doesn't exist or has moved. Let's head back home?";
      document.getElementById('ctaLabel').textContent = 'Back to home';
    }
  </script>
</body>
</html>
