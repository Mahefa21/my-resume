  <!-- Inline critical loader CSS so it's visible before JS/CSS modules load -->
  <style>
    #loader {
      position: fixed;
      inset: 0;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.7s ease, visibility 0.7s ease;
    }
    [data-theme="dark"] #loader { background: #0f172a; }
    #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-rings {
      position: relative;
      width: 110px;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .loader-ring {
      position: absolute;
      border-radius: 50%;
      border: 3px solid transparent;
    }
    .loader-ring-outer {
      width: 110px;
      height: 110px;
      border-top-color: #38bdf8;
      border-right-color: #38bdf8;
      animation: spin 1.4s linear infinite;
    }
    .loader-ring-inner {
      width: 78px;
      height: 78px;
      border-bottom-color: #818cf8;
      border-left-color: #818cf8;
      animation: spin 0.9s linear infinite reverse;
    }
    .loader-initials {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, #4cacd8 0%, #71727a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }
    .loader-text {
      margin-top: 28px;
      font-size: 12px;
      font-weight: 500;
      color: #475569;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-family: 'Poppins', sans-serif;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .loader-bar-wrap {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: #f1f5f9;
    }
    .loader-bar-fill {
      height: 100%;
      background: linear-gradient(135deg, #4cacd8 0%, #71727a 100%);
      animation: loadBar 1.8s ease-in-out forwards;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    @keyframes loadBar { 0% { width: 0%; } 60% { width: 75%; } 100% { width: 100%; } }
  </style>
</head>
